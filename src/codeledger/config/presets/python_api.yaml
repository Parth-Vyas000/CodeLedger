# CodeLedger Preset: Python API
project:
  language: python
  type: api
  phase_style: continuous

cadence:
  n_value: 5
  trigger: manual

model:
  tier: api
  provider: anthropic
  model_name: claude-sonnet-4-20250514
  api_key_env: ANTHROPIC_API_KEY
  max_input_tokens: 3000
  max_output_tokens: 5000

template_sections:
  - id: status
    name: Phase Execution Summary
    priority: 1
    format: table
  - id: architecture
    name: Code Architecture
    priority: 1
    format: tree_and_yaml
  - id: decisions
    name: Decision Rationale
    priority: 1
    format: table
  - id: logic
    name: Component Logic
    priority: 2
    format: prose
    depth: non_obvious_only
  - id: data_flow
    name: API Endpoints & Data Flow
    priority: 1
    format: ascii_diagram
  - id: edge_cases
    name: Edge Cases & Error Handling
    priority: 2
    format: table
  - id: interview
    name: Interview & Learning Notes
    priority: 3
    format: qa
  - id: debt
    name: Technical Debt
    priority: 3
    format: table
  - id: commands
    name: Quick Reference
    priority: 1
    format: code_blocks

focus:
  include_patterns:
    - "**/*.py"
    - "*.yaml"
    - "*.toml"
  exclude_patterns:
    - "tests/**"
    - "*.lock"
    - "__pycache__/**"
    - ".git/**"
    - ".codeledger/**"
    - ".venv/**"
    - "venv/**"
  skip_trivial: true

output:
  format: markdown
  compression: balanced
  max_doc_tokens: 8000

classifier:
  trivial_max_files: 2
  trivial_max_lines: 30
  minor_max_files: 5
  minor_max_lines: 150
  standard_max_files: 15
  standard_max_lines: 500
  max_deferred_sessions: 5
  flush_threshold: 0.40
