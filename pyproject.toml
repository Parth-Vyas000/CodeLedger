[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "codeledger"
version = "0.1.1"
description = "Auto-generated code comprehension for AI-assisted development — documentation as a development cadence."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "CodeLedger Contributors" }]
keywords = ["documentation", "ai", "code-comprehension", "vibe-coding", "developer-tools"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Documentation",
    "Topic :: Software Development :: Documentation",
]

dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "pyyaml>=6.0",
    "ruamel.yaml>=0.18.0",
    "pydantic>=2.0",
    "jinja2>=3.1.0",
    "anthropic>=0.25.0",
    "openai>=1.12.0",
    "pathspec>=0.12.0",
    "tiktoken>=0.6.0",
]

[project.optional-dependencies]
watch = [
    "watchdog>=4.0.0",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.4.0",
    "mypy>=1.9.0",
    "pre-commit>=3.7.0",
]

[project.scripts]
codeledger = "codeledger.cli:app"

[project.urls]
Homepage = "https://github.com/Parth-Vyas000/CodeLedger"
Repository = "https://github.com/Parth-Vyas000/CodeLedger"
Documentation = "https://parth-vyas000.github.io/CodeLedger"
Issues = "https://github.com/Parth-Vyas000/CodeLedger/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/codeledger"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
